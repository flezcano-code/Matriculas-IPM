<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Matrículas</title>

<style>
body { font-family: Arial; background:#eef2f7; margin:0; }

.header {
    background:#1e3a5f;
    color:white;
    padding:15px;
    display:flex;
    align-items:center;
    gap:15px;
}

.logo { height:50px; }

.container { padding:20px; }

.filtros {
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

input, select { padding:8px; }

.contador { margin-bottom:10px; font-weight:bold; }

.graficos {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:20px;
}

canvas {
    background:white;
    padding:10px;
    border-radius:10px;
}

table {
    width:100%;
    background:white;
    border-collapse:collapse;
}
th {
    background:#2f3640;
    color:white;
    padding:10px;
}
td {
    padding:8px;
    border-bottom:1px solid #eee;
}

button {
    padding:5px 10px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <img src="logo.png" class="logo">
    <h2>Sistema de Matrículas 2026</h2>
</div>

<div class="container">

<div class="filtros">
    <input type="text" id="buscar" placeholder="Buscar alumno o RUN">
    <select id="filtroCurso">
        <option value="">Todos los cursos</option>
    </select>
</div>

<div class="contador" id="contador"></div>

<div class="graficos">
    <canvas id="graficoCursos"></canvas>
    <canvas id="graficoGenero"></canvas>
</div>

<table>
<thead>
<tr>
<th>Estudiante</th>
<th>RUN</th>
<th>Curso</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<!-- Librerías -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSrlMaCB2BM5BjhtKoOCYZS4QJsSL7ZFPXefiDQYN4KZhyh6kyYd5wZQYOKfcueyTiM5NDOPU5_MN6E/pub?gid=0&single=true&output=csv";

let data = [];
let chartCursos, chartGenero;

Papa.parse(URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
        data = results.data;
        cargarCursos();
        render();
        crearGraficos(data);
    }
});

function cargarCursos(){
    const select = document.getElementById("filtroCurso");
    const cursos = [...new Set(data.map(d => d["Curso"]).filter(Boolean))];

    cursos.sort().forEach(curso => {
        select.innerHTML += `<option value="${curso}">${curso}</option>`;
    });
}

function render(){
    const b = document.getElementById("buscar").value.toLowerCase();
    const cursoFiltro = document.getElementById("filtroCurso").value;

    const tabla = document.getElementById("tabla");

    const filtrado = data.filter(d => {
        const coincideTexto =
            (d["Estudiante"] || "").toLowerCase().includes(b) ||
            (d["RUN / IPE"] || "").includes(b);

        const coincideCurso =
            !cursoFiltro || d["Curso"] === cursoFiltro;

        return coincideTexto && coincideCurso;
    });

    document.getElementById("contador").innerText =
        "Total alumnos: " + filtrado.length;

    tabla.innerHTML = "";

    filtrado.forEach((d,i) => {
        tabla.innerHTML += `
        <tr>
            <td>${safe(d["Estudiante"])}</td>
            <td>${safe(d["RUN / IPE"])}</td>
            <td>${safe(d["Curso"])}</td>
            <td><button onclick="verDetalle(${i})">Ver</button></td>
        </tr>`;
    });

    actualizarGraficos(filtrado);
}

function crearGraficos(datos){
    const cursos = contar(datos, "Curso");
    const genero = contar(datos, "Sexo");

    chartCursos = new Chart(document.getElementById("graficoCursos"), {
        type: 'bar',
        data: {
            labels: Object.keys(cursos),
            datasets: [{
                label: 'Alumnos por Curso',
                data: Object.values(cursos)
            }]
        }
    });

    chartGenero = new Chart(document.getElementById("graficoGenero"), {
        type: 'pie',
        data: {
            labels: Object.keys(genero),
            datasets: [{
                label: 'Género',
                data: Object.values(genero)
            }]
        }
    });
}

function actualizarGraficos(datos){
    const cursos = contar(datos, "Curso");
    const genero = contar(datos, "Sexo");

    chartCursos.data.labels = Object.keys(cursos);
    chartCursos.data.datasets[0].data = Object.values(cursos);
    chartCursos.update();

    chartGenero.data.labels = Object.keys(genero);
    chartGenero.data.datasets[0].data = Object.values(genero);
    chartGenero.update();
}

function contar(datos, campo){
    const conteo = {};
    datos.forEach(d => {
        const val = d[campo] || "Sin dato";
        conteo[val] = (conteo[val] || 0) + 1;
    });
    return conteo;
}

function verDetalle(i){
    const d = data[i];
    const w = window.open("", "_blank", "width=900,height=700");

    w.document.write("<html><body style='font-family:Arial;padding:20px'></body></html>");

    w.document.body.innerHTML = `
    <h2>${safe(d["Estudiante"])}</h2>
    <p><b>RUN:</b> ${safe(d["RUN / IPE"])}</p>
    <p><b>Curso:</b> ${safe(d["Curso"])}</p>

    <h3>Apoderado Titular</h3>
    <p>${safe(d["Nombre Apoderado TITULAR"])}</p>

    <h3>Apoderado Suplente</h3>
    <p>${safe(d["Nombre Apoderado SUPLENTE"])}</p>

    ${
        d["Merged Doc URL - FICHA 2026"]
        ? `<a href="${d["Merged Doc URL - FICHA 2026"]}" target="_blank">
            <button>Ver PDF</button>
          </a>`
        : ""
    }
    `;
}

function safe(text){
    if(!text) return "";
    return text.toString()
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

document.getElementById("buscar").addEventListener("input", render);
document.getElementById("filtroCurso").addEventListener("change", render);
</script>

</body>
</html>
