<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Matrículas</title>

<style>
body { font-family: Arial; background:#eef2f7; margin:0; }

/* HEADER */
.header {
    background:#0b6b2e;
    color:white;
    padding:15px 25px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.header-left {
    display:flex;
    align-items:center;
    gap:15px;
}

.logo { height:70px; }

.titulo {
    font-size:22px;
    font-weight:bold;
}

/* CONTENIDO */
.container { padding:20px; }

.filtros {
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

input, select { padding:8px; }

.contador {
    margin-bottom:10px;
    font-weight:bold;
}

/* TABLA */
table {
    width:100%;
    background:white;
    border-collapse:collapse;
}
th {
    background:#14532d;
    color:white;
    padding:10px;
}
td {
    padding:8px;
    border-bottom:1px solid #eee;
}

/* BOTONES */
button {
    padding:5px 10px;
    background:#15803d;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover {
    background:#166534;
}

/* PAGINACIÓN */
#paginacion {
    margin-top:15px;
}
#paginacion button {
    margin-right:5px;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-left">
        <img src="logo.png" class="logo">
        <div class="titulo">Sistema de Matrículas 2026</div>
    </div>
    <img src="logo2.png" class="logo">
</div>

<div class="container">

<div class="filtros">
    <input type="text" id="buscar" placeholder="Buscar alumno o RUN">
    <select id="filtroCurso">
        <option value="">Todos los cursos</option>
    </select>
</div>

<div class="contador" id="contador"></div>

<table>
<thead>
<tr>
<th>Estudiante</th>
<th>RUN</th>
<th>Curso</th>
<th>Revisión</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<div id="paginacion"></div>

</div>

<!-- PapaParse -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSrlMaCB2BM5BjhtKoOCYZS4QJsSL7ZFPXefiDQYN4KZhyh6kyYd5wZQYOKfcueyTiM5NDOPU5_MN6E/pub?gid=0&single=true&output=csv";

let data = [];
let pagina = 1;
const porPagina = 20;
let timeout;

Papa.parse(URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
        data = results.data;
        cargarCursos();
        render();
    }
});

function cargarCursos(){
    const select = document.getElementById("filtroCurso");
    const cursos = [...new Set(data.map(d => d["Curso"]).filter(Boolean))];

    cursos.sort().forEach(curso => {
        select.innerHTML += `<option value="${curso}">${curso}</option>`;
    });
}

function render(){
    const b = document.getElementById("buscar").value.toLowerCase();
    const cursoFiltro = document.getElementById("filtroCurso").value;

    const tabla = document.getElementById("tabla");

    const filtrado = data.filter(d => {
        const coincideTexto =
            (d["Estudiante"] || "").toLowerCase().includes(b) ||
            (d["RUN / IPE"] || "").includes(b);

        const coincideCurso =
            !cursoFiltro || d["Curso"] === cursoFiltro;

        return coincideTexto && coincideCurso;
    });

    document.getElementById("contador").innerText =
        "Total alumnos: " + filtrado.length;

    const inicio = (pagina - 1) * porPagina;
    const fin = inicio + porPagina;
    const paginaDatos = filtrado.slice(inicio, fin);

    tabla.innerHTML = "";

    paginaDatos.forEach(d => {
        const realIndex = data.indexOf(d);

        tabla.innerHTML += `
        <tr>
            <td>${safe(d["Estudiante"])}</td>
            <td>${safe(d["RUN / IPE"])}</td>
            <td>${safe(d["Curso"])}</td>
            <td><button onclick="verDetalle(${realIndex})">Review</button></td>
        </tr>`;
    });

    renderPaginacion(filtrado.length);
}

function renderPaginacion(total){
    const totalPaginas = Math.ceil(total / porPagina);
    const cont = document.getElementById("paginacion");

    cont.innerHTML = "";

    for(let i = 1; i <= totalPaginas; i++){
        cont.innerHTML += `
        <button onclick="irPagina(${i})">${i}</button>`;
    }
}

function irPagina(p){
    pagina = p;
    render();
}

function verDetalle(i){
    const d = data[i];

    const w = window.open("", "_blank", "width=1000,height=800");

    const pdfUrl = d["Merged Doc URL - FICHA 2026"]
        ? d["Merged Doc URL - FICHA 2026"].replace("/view", "/preview")
        : "";

    w.document.write("<html><body style='font-family:Arial;padding:20px'></body></html>");

    w.document.body.innerHTML = `
    <h2 style="color:#0b6b2e">${safe(d["Estudiante"])}</h2>

    <p><b>RUN:</b> ${safe(d["RUN / IPE"])}</p>
    <p><b>Curso:</b> ${safe(d["Curso"])}</p>

    <h3>Apoderado Titular</h3>
    <p>${safe(d["Nombre Apoderado TITULAR"])}</p>

    <h3>Apoderado Suplente</h3>
    <p>${safe(d["Nombre Apoderado SUPLENTE"])}</p>

    ${
        pdfUrl
        ? `<h3>Ficha</h3>
           <iframe src="${pdfUrl}" width="100%" height="500"></iframe>`
        : ""
    }
    `;
}

function safe(text){
    if(!text) return "";
    return text.toString()
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

/* BUSCADOR OPTIMIZADO */
document.getElementById("buscar").addEventListener("input", () => {
    clearTimeout(timeout);
    timeout = setTimeout(() => {
        pagina = 1;
        render();
    }, 300);
});

document.getElementById("filtroCurso").addEventListener("change", () => {
    pagina = 1;
    render();
});
</script>

</body>
</html>
