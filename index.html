<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Matrículas</title>

<style>
body { font-family: Arial; background:#eef2f7; margin:0; }
.header { background:#1e3a5f; color:white; padding:15px; }
.container { padding:20px; }

.filtros { display:flex; gap:10px; margin-bottom:15px; }
input, select { padding:8px; }

table {
    width:100%;
    background:white;
    border-collapse:collapse;
}
th {
    background:#2f3640;
    color:white;
    padding:10px;
}
td {
    padding:8px;
    border-bottom:1px solid #eee;
}

button {
    padding:5px 10px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

.detalle {
    display:none;
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.modal {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.5);
}

.modal-content {
    background:white;
    padding:20px;
    margin:10% auto;
    width:60%;
}

iframe {
    width:100%;
    height:500px;
    border:none;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="header">📚 Sistema de Matrículas 2026</div>

<div class="container">

<div class="filtros">
    <input type="text" id="buscar" placeholder="Buscar alumno o RUT">
</div>

<table>
<thead>
<tr>
<th>Estudiante</th>
<th>RUN</th>
<th>Curso</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<div id="detalle" class="detalle"></div>

<div id="modal" class="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSrlMaCB2BM5BjhtKoOCYZS4QJsSL7ZFPXefiDQYN4KZhyh6kyYd5wZQYOKfcueyTiM5NDOPU5_MN6E/pub?gid=0&single=true&output=csv";

let data = [];

fetch(URL)
.then(r => r.text())
.then(csv => {

    const filas = csv.split("\n").map(f => f.split(","));
    const headers = filas[0];

    const get = name => headers.findIndex(h => h.trim() === name);

    const idx = {
        rut: get("RUN / IPE"),
        nacionalidad: get("Nacionalidad"),
        nombre: get("Estudiante"),
        social: get("Nombre Social"),
        nacimiento: get("Fecha Nacimiento"),
        sexo: get("Sexo"),
        genero: get("Id. de Género"),
        nivel: get("Nivel"),
        curso: get("Curso"),
        domicilio: get("Domicilio"),
        comuna: get("Comuna"),
        correo: get("Correo Electrónico"),
        telefono: get("Teléfono"),
        pdf: get("Merged Doc URL - FICHA 2026"),

        ap_tit: get("Nombre Apoderado TITULAR"),
        rut_tit: get("RUT  TITULAR"),
        tel_tit: get("Teléfono  TITULAR"),
        mail_tit: get("Correo Electrónico  TITULAR"),

        ap_sup: get("Nombre Apoderado SUPLENTE"),
        rut_sup: get("RUT SUPLENTE"),
        tel_sup: get("Teléfono SUPLENTE"),
        mail_sup: get("Correo Electrónico SUPLENTE")
    };

    data = filas.slice(1).map(c => {
        let obj = {};
        for (let k in idx) obj[k] = c[idx[k]];
        return obj;
    });

    render();
});

function render(){
    const b = document.getElementById("buscar").value.toLowerCase();

    const filtrado = data.filter(d =>
        d.nombre?.toLowerCase().includes(b) ||
        d.rut?.includes(b)
    );

    const tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    filtrado.forEach((d,i) => {
        tabla.innerHTML += `
        <tr>
            <td>${d.nombre || ""}</td>
            <td>${d.rut || ""}</td>
            <td>${d.curso || ""}</td>
            <td><button class="btn-ver" data-id="${i}">Ver</button></td>
        </tr>`;
    });

    document.querySelectorAll(".btn-ver").forEach(btn => {
        btn.addEventListener("click", e => {
            const id = e.target.dataset.id;
            verDetalle(id);
        });
    });
}

function verDetalle(i){
    const d = data[i];

    const detalle = document.getElementById("detalle");
    detalle.style.display = "block";

    detalle.innerHTML = `
    <h3>${d.nombre}</h3>

    <div class="grid">
        <div><b>RUN:</b> ${d.rut}</div>
        <div><b>Nacionalidad:</b> ${d.nacionalidad}</div>
        <div><b>Nombre Social:</b> ${d.social}</div>
        <div><b>Fecha Nacimiento:</b> ${d.nacimiento}</div>
        <div><b>Sexo:</b> ${d.sexo}</div>
        <div><b>Género:</b> ${d.genero}</div>
        <div><b>Nivel:</b> ${d.nivel}</div>
        <div><b>Curso:</b> ${d.curso}</div>
        <div><b>Domicilio:</b> ${d.domicilio}</div>
        <div><b>Comuna:</b> ${d.comuna}</div>
        <div><b>Correo:</b> ${d.correo}</div>
        <div><b>Teléfono:</b> ${d.telefono}</div>
    </div>

    <br>
    <button onclick="verApoderado(${i})">Ver Apoderados</button>

    <h4>Ficha del Estudiante</h4>
    ${d.pdf ? `<a href="${d.pdf}" target="_blank">
    <button>Ver PDF</button>
</a>` : "Sin PDF"}
    `;
}

function verApoderado(i){
    const d = data[i];

    const modal = document.getElementById("modal");
    const content = document.getElementById("modalContent");

    modal.style.display = "block";

    content.innerHTML = `
    <h3>Apoderado Titular</h3>
    <p>${d.ap_tit || ""}</p>
    <p>RUT: ${d.rut_tit || ""}</p>
    <p>Tel: ${d.tel_tit || ""}</p>
    <p>Email: ${d.mail_tit || ""}</p>

    <h3>Apoderado Suplente</h3>
    <p>${d.ap_sup || ""}</p>
    <p>RUT: ${d.rut_sup || ""}</p>
    <p>Tel: ${d.tel_sup || ""}</p>
    <p>Email: ${d.mail_sup || ""}</p>

    <br>
    <button onclick="cerrarModal()">Cerrar</button>
    `;
}

function cerrarModal(){
    document.getElementById("modal").style.display = "none";
}

document.getElementById("buscar").addEventListener("input", render);
</script>

</body>
</html>
