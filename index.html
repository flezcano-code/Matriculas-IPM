<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Matrículas</title>

<style>
body { font-family: Arial; background:#eef2f7; margin:0; }
.header { background:#1e3a5f; color:white; padding:15px; }
.container { padding:20px; }

input { padding:8px; margin-bottom:15px; width:300px; }

table {
    width:100%;
    background:white;
    border-collapse:collapse;
}
th {
    background:#2f3640;
    color:white;
    padding:10px;
}
td {
    padding:8px;
    border-bottom:1px solid #eee;
}

button {
    padding:5px 10px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">📚 Sistema de Matrículas 2026</div>

<div class="container">

<input type="text" id="buscar" placeholder="Buscar alumno o RUT">

<table>
<thead>
<tr>
<th>Estudiante</th>
<th>RUN</th>
<th>Curso</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<!-- PapaParse -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSrlMaCB2BM5BjhtKoOCYZS4QJsSL7ZFPXefiDQYN4KZhyh6kyYd5wZQYOKfcueyTiM5NDOPU5_MN6E/pub?gid=0&single=true&output=csv";

let data = [];

Papa.parse(URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
        data = results.data;
        render();
    }
});

function render(){
    const b = document.getElementById("buscar").value.toLowerCase();
    const tabla = document.getElementById("tabla");

    tabla.innerHTML = "";

    data
    .filter(d =>
        (d["Estudiante"] || "").toLowerCase().includes(b) ||
        (d["RUN / IPE"] || "").includes(b)
    )
    .forEach((d,i) => {
        tabla.innerHTML += `
        <tr>
            <td>${safe(d["Estudiante"])}</td>
            <td>${safe(d["RUN / IPE"])}</td>
            <td>${safe(d["Curso"])}</td>
            <td><button onclick="verDetalle(${i})">Ver</button></td>
        </tr>`;
    });
}

function verDetalle(i){
    const d = data[i];

    const ventana = window.open("", "_blank", "width=800,height=700");

    ventana.document.write("<html><head><title>Ficha Alumno</title></head><body></body></html>");

    const doc = ventana.document;

    doc.body.innerHTML = `
    <style>
        body { font-family: Arial; padding:20px; }
        h2 { color:#1e3a5f; }
        .grid {
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:10px;
        }
        button {
            padding:6px 12px;
            margin-right:10px;
            background:#2563eb;
            color:white;
            border:none;
            cursor:pointer;
        }
    </style>

    <h2>${safe(d["Estudiante"])}</h2>

    <div class="grid">
        <div><b>RUN:</b> ${safe(d["RUN / IPE"])}</div>
        <div><b>Nacionalidad:</b> ${safe(d["Nacionalidad"])}</div>
        <div><b>Nombre Social:</b> ${safe(d["Nombre Social"])}</div>
        <div><b>Fecha Nacimiento:</b> ${safe(d["Fecha Nacimiento"])}</div>
        <div><b>Sexo:</b> ${safe(d["Sexo"])}</div>
        <div><b>Género:</b> ${safe(d["Id. de Género"])}</div>
        <div><b>Nivel:</b> ${safe(d["Nivel"])}</div>
        <div><b>Curso:</b> ${safe(d["Curso"])}</div>
        <div><b>Domicilio:</b> ${safe(d["Domicilio"])}</div>
        <div><b>Comuna:</b> ${safe(d["Comuna"])}</div>
        <div><b>Correo:</b> ${safe(d["Correo Electrónico"])}</div>
        <div><b>Teléfono:</b> ${safe(d["Teléfono"])}</div>
    </div>

    <br><br>

    <button id="btnApoderado">Ver Apoderados</button>

    ${
        d["Merged Doc URL - FICHA 2026"]
        ? `<a href="${d["Merged Doc URL - FICHA 2026"]}" target="_blank">
            <button>Ver PDF</button>
          </a>`
        : ""
    }
    `;

    doc.getElementById("btnApoderado").onclick = () => {
        verApoderado(i);
    };
}

function verApoderado(i){
    const d = data[i];

    const w = window.open("", "_blank", "width=600,height=600");

    w.document.write("<html><head><title>Apoderados</title></head><body></body></html>");

    w.document.body.innerHTML = `
    <style>
        body { font-family: Arial; padding:20px; }
        h2 { color:#1e3a5f; }
    </style>

    <h2>Apoderado Titular</h2>
    <p><b>Nombre:</b> ${safe(d["Nombre Apoderado TITULAR"])}</p>
    <p><b>RUT:</b> ${safe(d["RUT  TITULAR"])}</p>
    <p><b>Teléfono:</b> ${safe(d["Teléfono  TITULAR"])}</p>
    <p><b>Email:</b> ${safe(d["Correo Electrónico  TITULAR"])}</p>

    <h2>Apoderado Suplente</h2>
    <p><b>Nombre:</b> ${safe(d["Nombre Apoderado SUPLENTE"])}</p>
    <p><b>RUT:</b> ${safe(d["RUT SUPLENTE"])}</p>
    <p><b>Teléfono:</b> ${safe(d["Teléfono SUPLENTE"])}</p>
    <p><b>Email:</b> ${safe(d["Correo Electrónico SUPLENTE"])}</p>
    `;
}

function safe(text){
    if(!text) return "";
    return text.toString()
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

document.getElementById("buscar").addEventListener("input", render);
</script>

</body>
</html>
